server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The SPA shell must always be revalidated so browsers don't keep serving
    # an old HTML entrypoint that references outdated JS chunks after deploys.
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Login page — serve prerendered HTML but tell crawlers not to index it.
    # Belt-and-suspenders alongside the noindex meta tag in the prerendered HTML
    # and Disallow: /login in robots.txt.
    location = /login {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri/index.html /index.html;
    }

    # robots.txt — plain text; 1-day cache so it can be updated without a full rebuild
    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # sitemap.xml — served as application/xml; 1-day cache
    # `types {}` overrides nginx's default mime.types (which maps .xml → text/xml)
    location = /sitemap.xml {
        types { }
        default_type application/xml;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Web app manifest — served with correct MIME type; 1-day cache
    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ES module workers must be served as JavaScript, otherwise pdf.js refuses
    # to load them and falls back to the fake worker path.
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve hashed static assets with long-term immutable cache
    # Vite fingerprints all JS/CSS/font filenames, so immutable is safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Redirect trailing slashes to canonical no-trailing-slash URLs (except root /).
    # Without this, /pricing/ falls through to /index.html (SPA shell) instead of
    # the prerendered /pricing/index.html, and the shell has canonical="/" which
    # triggers a Google canonical conflict.
    location ~ ^(.+)/$ {
        return 301 $1$is_args$args;
    }

    # SPA fallback — for prerendered routes (e.g. /pricing → dist/pricing/index.html)
    # Using $uri/index.html avoids the nginx 301 directory-redirect that would occur
    # with $uri/, which creates a canonical mismatch vs. the no-trailing-slash URLs
    # in the sitemap and <link rel="canonical"> tags.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
